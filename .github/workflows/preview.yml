name: KIA 경기 프리뷰 알림

# 경기 시작 약 1시간 전에 프리뷰 발송:
# 유머 헤드라인 + 선발 육각능력치 + 클로드 예상 스코어 + 승부예상 + 직관 리마인더.
# 경기 시작시간이 매일 달라서(평일 18:30, 주말 14:00/17:00 등) 오후에 10분마다 폴링하고,
# 엔드포인트가 "시작 60분 전"인지 판정해 그 시점에만 발송. 하루 1회(gameId 캐시).
# cron 은 UTC. KST = UTC + 9h. 12:00~18:50 KST 폴링 = 03:00~09:50 UTC.

on:
  schedule:
    - cron: "*/10 3-9 * * *"  # 12:00~18:50 KST, 10분마다
  workflow_dispatch: {}        # 수동 실행 버튼(타이밍 무시하고 발송)

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: 수동 실행이면 타이밍 무시(force)
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "force=&force=1" >> "$GITHUB_OUTPUT"
          else
            echo "force=" >> "$GITHUB_OUTPUT"
          fi

      - name: 발송 타이밍 확인 (시작 60분 전?)
        id: check
        run: |
          RESP=$(curl -s --max-time 30 "${{ secrets.SITE_URL }}/api/preview?dry=1&key=${{ secrets.CRON_SECRET }}${{ steps.mode.outputs.force }}")
          echo "응답: $RESP"
          echo "sendable=$(echo "$RESP" | jq -r '.sendable // false')" >> "$GITHUB_OUTPUT"
          echo "gameId=$(echo "$RESP" | jq -r '.gameId // ""')" >> "$GITHUB_OUTPUT"

      - name: 중복 확인 (오늘 이미 보낸 프리뷰인지)
        id: dedup
        if: steps.check.outputs.sendable == 'true'
        uses: actions/cache/restore@v4
        with:
          path: preview.flag
          key: kia-preview-${{ steps.check.outputs.gameId }}

      - name: 프리뷰 발송
        if: steps.check.outputs.sendable == 'true' && steps.dedup.outputs.cache-hit != 'true'
        run: |
          echo "프리뷰 발송 gameId=${{ steps.check.outputs.gameId }}"
          curl -sf --max-time 30 \
            "${{ secrets.SITE_URL }}/api/preview?key=${{ secrets.CRON_SECRET }}&gameId=${{ steps.check.outputs.gameId }}${{ steps.mode.outputs.force }}"
          echo "sent" > preview.flag

      - name: 발송 기록 저장
        if: steps.check.outputs.sendable == 'true' && steps.dedup.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: preview.flag
          key: kia-preview-${{ steps.check.outputs.gameId }}
