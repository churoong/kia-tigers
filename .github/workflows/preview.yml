name: KIA 경기 프리뷰 알림

# 경기 당일 18:00 KST 에 프리뷰 발송:
# 유머 헤드라인 + 선발 육각능력치 + 클로드 예상 스코어 + 승부예상 + 직관 리마인더.
# (18시면 선발 발표 완료. 야간경기 18:30 시작 30분 전.)
# 하루 1회만(gameId 캐시). cron 은 UTC. KST = UTC + 9h.

on:
  schedule:
    - cron: "0 9 * * *"   # 18:00 KST
  workflow_dispatch: {}   # 수동 실행 버튼

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: 프리뷰 발송 가능 확인
        id: check
        run: |
          RESP=$(curl -s --max-time 30 "${{ secrets.SITE_URL }}/api/preview?dry=1&key=${{ secrets.CRON_SECRET }}")
          echo "응답: $RESP"
          echo "sendable=$(echo "$RESP" | jq -r '.sendable // false')" >> "$GITHUB_OUTPUT"
          echo "gameId=$(echo "$RESP" | jq -r '.gameId // ""')" >> "$GITHUB_OUTPUT"

      - name: 중복 확인 (오늘 이미 보낸 프리뷰인지)
        id: dedup
        if: steps.check.outputs.sendable == 'true'
        uses: actions/cache/restore@v4
        with:
          path: preview.flag
          key: kia-preview-${{ steps.check.outputs.gameId }}

      - name: 프리뷰 발송
        if: steps.check.outputs.sendable == 'true' && steps.dedup.outputs.cache-hit != 'true'
        run: |
          echo "프리뷰 발송 gameId=${{ steps.check.outputs.gameId }}"
          curl -sf --max-time 30 \
            "${{ secrets.SITE_URL }}/api/preview?key=${{ secrets.CRON_SECRET }}&gameId=${{ steps.check.outputs.gameId }}"
          echo "sent" > preview.flag

      - name: 발송 기록 저장
        if: steps.check.outputs.sendable == 'true' && steps.dedup.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: preview.flag
          key: kia-preview-${{ steps.check.outputs.gameId }}
