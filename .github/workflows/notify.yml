name: KIA 경기 종료 알림

# 저녁 21:00 / 21:30 / 22:00 KST 에 경기 종료 확인 → 끝났으면 즉시 텔레그램 발송.
# 22:00까지 안 끝난(=10시 이후 종료) 경기는 다음날 08:00 KST 에 발송.
# 중복 발송은 gameId 캐시로 하룻밤 1회만 되도록 방지.
# (GitHub Actions cron 은 UTC 기준. KST = UTC + 9h)

on:
  schedule:
    - cron: "0 12 * * *"   # 21:00 KST
    - cron: "30 12 * * *"  # 21:30 KST
    - cron: "0 13 * * *"   # 22:00 KST
    - cron: "0 23 * * *"   # 08:00 KST (다음날 아침)
  workflow_dispatch: {}    # 수동 실행 버튼

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 경기 상태 확인
        id: check
        run: |
          RESP=$(curl -s --max-time 30 "${{ secrets.SITE_URL }}/api/notify?dry=1&key=${{ secrets.CRON_SECRET }}")
          echo "응답: $RESP"
          echo "sendable=$(echo "$RESP" | jq -r '.sendable // false')" >> "$GITHUB_OUTPUT"
          echo "gameId=$(echo "$RESP" | jq -r '.gameId // ""')" >> "$GITHUB_OUTPUT"

      - name: 중복 확인 (이미 보낸 경기인지)
        id: dedup
        if: steps.check.outputs.sendable == 'true'
        uses: actions/cache/restore@v4
        with:
          path: sent.flag
          key: kia-sent-${{ steps.check.outputs.gameId }}

      - name: 텔레그램 발송
        if: steps.check.outputs.sendable == 'true' && steps.dedup.outputs.cache-hit != 'true'
        run: |
          echo "발송 대상 gameId=${{ steps.check.outputs.gameId }}"
          curl -sf --max-time 30 \
            "${{ secrets.SITE_URL }}/api/notify?key=${{ secrets.CRON_SECRET }}&gameId=${{ steps.check.outputs.gameId }}"
          echo "sent" > sent.flag

      - name: 발송 기록 저장 (다음 폴링에서 재발송 방지)
        if: steps.check.outputs.sendable == 'true' && steps.dedup.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: sent.flag
          key: kia-sent-${{ steps.check.outputs.gameId }}
